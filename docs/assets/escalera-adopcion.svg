<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" width="920" height="600" role="img" aria-label="La escalera de adopción de la IA generativa: seis escalones desde la síntesis y redacción asistida hasta los formatos estructurados, con el módulo 1 de conceptos como descansillo entre los escalones 3 y 4">
  <defs>
    <style>
      .titulo { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 21px; font-weight: 700; fill: #1a202c; }
      .subtitulo { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #4a5568; }
      .etiqueta { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #1a202c; }
      .numero-azul { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .numero-gris { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 700; fill: #334155; }
      .badge-titulo { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 700; fill: #0f766e; letter-spacing: 0.5px; }
      .badge-sub { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #0f766e; }
      .tramo-azul { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #2563eb; }
      .tramo-gris { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #4a5568; }
      .regla { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-style: italic; fill: #4a5568; }
      .linea-tramo { stroke: #cbd5e0; stroke-width: 2; }
    </style>
  </defs>

  <!-- Título -->
  <text class="titulo" x="460" y="40" text-anchor="middle">La escalera de adopción de la IA generativa</text>
  <text class="subtitulo" x="460" y="64" text-anchor="middle">Seis escalones de práctica, con los conceptos del módulo 1 como descansillo</text>

  <!-- Escalón 1 -->
  <text class="etiqueta" x="93" y="358" text-anchor="middle">Síntesis y</text>
  <text class="etiqueta" x="93" y="374" text-anchor="middle">redacción</text>
  <rect x="33" y="392" width="120" height="78" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="93" y="428" text-anchor="middle">1</text>

  <!-- Escalón 2 -->
  <text class="etiqueta" x="227" y="302" text-anchor="middle">Prompting</text>
  <text class="etiqueta" x="227" y="318" text-anchor="middle">estructurado</text>
  <rect x="167" y="336" width="120" height="134" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="227" y="372" text-anchor="middle">2</text>

  <!-- Escalón 3 -->
  <text class="etiqueta" x="361" y="246" text-anchor="middle">Iteración</text>
  <text class="etiqueta" x="361" y="262" text-anchor="middle">como método</text>
  <rect x="301" y="280" width="120" height="190" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="361" y="316" text-anchor="middle">3</text>

  <!-- Descansillo: Módulo 1 (conceptos), entre los escalones 3 y 4 -->
  <rect x="437" y="235" width="46" height="220" rx="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="badge-titulo" transform="rotate(-90 452 345)" x="452" y="345" text-anchor="middle">MÓDULO 1</text>
  <text class="badge-sub" transform="rotate(-90 469 345)" x="469" y="345" text-anchor="middle">los conceptos</text>

  <!-- Escalón 4 -->
  <text class="etiqueta" x="559" y="202" text-anchor="middle">Encadenamiento</text>
  <rect x="499" y="224" width="120" height="246" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="559" y="260" text-anchor="middle">4</text>

  <!-- Escalón 5 -->
  <text class="etiqueta" x="693" y="130" text-anchor="middle">Documentos</text>
  <text class="etiqueta" x="693" y="146" text-anchor="middle">adjuntos</text>
  <rect x="633" y="168" width="120" height="302" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="693" y="204" text-anchor="middle">5</text>

  <!-- Escalón 6 -->
  <text class="etiqueta" x="827" y="74" text-anchor="middle">Formatos</text>
  <text class="etiqueta" x="827" y="90" text-anchor="middle">estructurados</text>
  <rect x="767" y="112" width="120" height="358" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="827" y="148" text-anchor="middle">6</text>

  <!-- Tramo 1: Antes de empezar -->
  <line class="linea-tramo" x1="33" y1="488" x2="421" y2="488"/>
  <line class="linea-tramo" x1="33" y1="483" x2="33" y2="493"/>
  <line class="linea-tramo" x1="421" y1="483" x2="421" y2="493"/>
  <text class="tramo-azul" x="227" y="510" text-anchor="middle">Antes de empezar · escalones 1-3</text>

  <!-- Tramo 2: Módulo 2 -->
  <line class="linea-tramo" x1="499" y1="488" x2="887" y2="488"/>
  <line class="linea-tramo" x1="499" y1="483" x2="499" y2="493"/>
  <line class="linea-tramo" x1="887" y1="483" x2="887" y2="493"/>
  <text class="tramo-gris" x="693" y="510" text-anchor="middle">Módulo 2 · escalones 4-6</text>

  <!-- Regla de cierre -->
  <text class="regla" x="460" y="556" text-anchor="middle">La regla que recorre los seis escalones: la precisión de la entrada determina la precisión de la salida</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" width="920" height="580" role="img" aria-label="La escalera de adopción de la IA generativa: seis escalones desde la síntesis y redacción asistida hasta los formatos estructurados">
  <defs>
    <style>
      .titulo { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 21px; font-weight: 700; fill: #1a202c; }
      .subtitulo { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #4a5568; }
      .etiqueta { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #1a202c; }
      .numero-azul { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .numero-gris { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 700; fill: #334155; }
      .tramo-azul { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #2563eb; }
      .tramo-gris { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #4a5568; }
      .regla { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-style: italic; fill: #4a5568; }
      .linea-tramo { stroke: #cbd5e0; stroke-width: 2; }
    </style>
  </defs>

  <!-- Título -->
  <text class="titulo" x="460" y="40" text-anchor="middle">La escalera de adopción de la IA generativa</text>
  <text class="subtitulo" x="460" y="64" text-anchor="middle">Seis escalones, del primer resumen a los formatos reutilizables</text>

  <!-- Escalón 1 -->
  <text class="etiqueta" x="100" y="358" text-anchor="middle">Síntesis y</text>
  <text class="etiqueta" x="100" y="374" text-anchor="middle">redacción</text>
  <rect x="33" y="392" width="134" height="78" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="100" y="428" text-anchor="middle">1</text>

  <!-- Escalón 2 -->
  <text class="etiqueta" x="244" y="302" text-anchor="middle">Prompting</text>
  <text class="etiqueta" x="244" y="318" text-anchor="middle">estructurado</text>
  <rect x="177" y="336" width="134" height="134" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="244" y="372" text-anchor="middle">2</text>

  <!-- Escalón 3 -->
  <text class="etiqueta" x="388" y="246" text-anchor="middle">Iteración</text>
  <text class="etiqueta" x="388" y="262" text-anchor="middle">como método</text>
  <rect x="321" y="280" width="134" height="190" rx="6" fill="#2563eb" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-azul" x="388" y="316" text-anchor="middle">3</text>

  <!-- Escalón 4 -->
  <text class="etiqueta" x="532" y="202" text-anchor="middle">Encadenamiento</text>
  <rect x="465" y="224" width="134" height="246" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="532" y="260" text-anchor="middle">4</text>

  <!-- Escalón 5 -->
  <text class="etiqueta" x="676" y="130" text-anchor="middle">Documentos</text>
  <text class="etiqueta" x="676" y="146" text-anchor="middle">adjuntos</text>
  <rect x="609" y="168" width="134" height="302" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="676" y="204" text-anchor="middle">5</text>

  <!-- Escalón 6 -->
  <text class="etiqueta" x="820" y="74" text-anchor="middle">Formatos</text>
  <text class="etiqueta" x="820" y="90" text-anchor="middle">estructurados</text>
  <rect x="753" y="112" width="134" height="358" rx="6" fill="#cbd5e0" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
  <text class="numero-gris" x="820" y="148" text-anchor="middle">6</text>

  <!-- Tramos -->
  <line class="linea-tramo" x1="33" y1="488" x2="455" y2="488"/>
  <line class="linea-tramo" x1="33" y1="483" x2="33" y2="493"/>
  <line class="linea-tramo" x1="455" y1="483" x2="455" y2="493"/>
  <text class="tramo-azul" x="244" y="510" text-anchor="middle">Antes de empezar · escalones 1-3</text>

  <line class="linea-tramo" x1="465" y1="488" x2="887" y2="488"/>
  <line class="linea-tramo" x1="465" y1="483" x2="465" y2="493"/>
  <line class="linea-tramo" x1="887" y1="483" x2="887" y2="493"/>
  <text class="tramo-gris" x="676" y="510" text-anchor="middle">Módulo 2 · escalones 4-6</text>

  <!-- Regla de cierre -->
  <text class="regla" x="460" y="552" text-anchor="middle">La regla que recorre los seis escalones: la precisión de la entrada determina la precisión de la salida</text>
</svg>
